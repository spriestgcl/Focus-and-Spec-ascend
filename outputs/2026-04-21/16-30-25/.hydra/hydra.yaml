hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - algorithm.adv_estimator=grpo
    - data.train_files=/home/deepmath/train_1k.parquet
    - data.val_files=/home/deepmath/train_1k.parquet
    - data.train_batch_size=16
    - data.max_prompt_length=1024
    - data.max_response_length=4096
    - data.filter_overlong_prompts=True
    - data.val_max_samples=256
    - data.truncation=error
    - actor_rollout_ref.model.path=/mnt/model/gcl/Qwen2.5-7B-Instruct
    - actor_rollout_ref.model.lora_rank=16
    - actor_rollout_ref.model.lora_alpha=32
    - actor_rollout_ref.model.target_modules=all-linear
    - actor_rollout_ref.actor.optim.lr=1e-6
    - actor_rollout_ref.model.use_remove_padding=True
    - actor_rollout_ref.actor.ppo_mini_batch_size=4
    - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=1
    - actor_rollout_ref.actor.use_kl_loss=True
    - actor_rollout_ref.actor.kl_loss_coef=0.001
    - actor_rollout_ref.actor.kl_loss_type=low_var_kl
    - actor_rollout_ref.actor.entropy_coeff=0
    - actor_rollout_ref.actor.use_torch_compile=False
    - actor_rollout_ref.model.enable_gradient_checkpointing=True
    - actor_rollout_ref.model.enable_activation_offload=True
    - actor_rollout_ref.actor.fsdp_config.param_offload=True
    - actor_rollout_ref.actor.fsdp_config.optimizer_offload=True
    - actor_rollout_ref.actor.fsdp_config.use_torch_compile=False
    - actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=1
    - actor_rollout_ref.rollout.tensor_model_parallel_size=1
    - actor_rollout_ref.rollout.name=vllm
    - actor_rollout_ref.rollout.temperature=0.7
    - actor_rollout_ref.rollout.top_p=0.8
    - actor_rollout_ref.rollout.top_k=20
    - actor_rollout_ref.rollout.load_format=safetensors
    - actor_rollout_ref.rollout.layered_summon=True
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.45
    - actor_rollout_ref.rollout.n=1
    - actor_rollout_ref.rollout.max_num_batched_tokens=32768
    - actor_rollout_ref.rollout.free_cache_engine=False
    - actor_rollout_ref.nccl_timeout=3600
    - actor_rollout_ref.rollout.redundant_inference_enabled=True
    - actor_rollout_ref.rollout.redundancy_p=0.25
    - actor_rollout_ref.rollout.redundant_partial_prompt_accept_ratio=0.75
    - actor_rollout_ref.rollout.redundant_short_rounds_per_cycle=4
    - actor_rollout_ref.rollout.redundant_flush_tail_at_epoch_end=True
    - actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=1
    - actor_rollout_ref.ref.fsdp_config.param_offload=True
    - actor_rollout_ref.ref.fsdp_config.use_torch_compile=False
    - algorithm.use_kl_in_reward=False
    - trainer.critic_warmup=0
    - trainer.logger=["console"]
    - trainer.val_before_train=False
    - trainer.default_hdfs_dir=null
    - trainer.n_gpus_per_node=4
    - trainer.nnodes=1
    - trainer.save_freq=1000
    - trainer.test_freq=1000
    - trainer.resume_mode=disable
    - trainer.default_local_dir=/root/Focus-and-Spec-ascend/verl/wyj_test/checkpoints/gsm8k_redundant_fresh
    - trainer.total_epochs=1
    - trainer.device=npu
  job:
    name: main_ppo
    chdir: null
    override_dirname: actor_rollout_ref.actor.entropy_coeff=0,actor_rollout_ref.actor.fsdp_config.optimizer_offload=True,actor_rollout_ref.actor.fsdp_config.param_offload=True,actor_rollout_ref.actor.fsdp_config.use_torch_compile=False,actor_rollout_ref.actor.kl_loss_coef=0.001,actor_rollout_ref.actor.kl_loss_type=low_var_kl,actor_rollout_ref.actor.optim.lr=1e-6,actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=1,actor_rollout_ref.actor.ppo_mini_batch_size=4,actor_rollout_ref.actor.use_kl_loss=True,actor_rollout_ref.actor.use_torch_compile=False,actor_rollout_ref.model.enable_activation_offload=True,actor_rollout_ref.model.enable_gradient_checkpointing=True,actor_rollout_ref.model.lora_alpha=32,actor_rollout_ref.model.lora_rank=16,actor_rollout_ref.model.path=/mnt/model/gcl/Qwen2.5-7B-Instruct,actor_rollout_ref.model.target_modules=all-linear,actor_rollout_ref.model.use_remove_padding=True,actor_rollout_ref.nccl_timeout=3600,actor_rollout_ref.ref.fsdp_config.param_offload=True,actor_rollout_ref.ref.fsdp_config.use_torch_compile=False,actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=1,actor_rollout_ref.rollout.free_cache_engine=False,actor_rollout_ref.rollout.gpu_memory_utilization=0.45,actor_rollout_ref.rollout.layered_summon=True,actor_rollout_ref.rollout.load_format=safetensors,actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=1,actor_rollout_ref.rollout.max_num_batched_tokens=32768,actor_rollout_ref.rollout.n=1,actor_rollout_ref.rollout.name=vllm,actor_rollout_ref.rollout.redundancy_p=0.25,actor_rollout_ref.rollout.redundant_flush_tail_at_epoch_end=True,actor_rollout_ref.rollout.redundant_inference_enabled=True,actor_rollout_ref.rollout.redundant_partial_prompt_accept_ratio=0.75,actor_rollout_ref.rollout.redundant_short_rounds_per_cycle=4,actor_rollout_ref.rollout.temperature=0.7,actor_rollout_ref.rollout.tensor_model_parallel_size=1,actor_rollout_ref.rollout.top_k=20,actor_rollout_ref.rollout.top_p=0.8,algorithm.adv_estimator=grpo,algorithm.use_kl_in_reward=False,data.filter_overlong_prompts=True,data.max_prompt_length=1024,data.max_response_length=4096,data.train_batch_size=16,data.train_files=/home/deepmath/train_1k.parquet,data.truncation=error,data.val_files=/home/deepmath/train_1k.parquet,data.val_max_samples=256,trainer.critic_warmup=0,trainer.default_hdfs_dir=null,trainer.default_local_dir=/root/Focus-and-Spec-ascend/verl/wyj_test/checkpoints/gsm8k_redundant_fresh,trainer.device=npu,trainer.logger=["console"],trainer.n_gpus_per_node=4,trainer.nnodes=1,trainer.resume_mode=disable,trainer.save_freq=1000,trainer.test_freq=1000,trainer.total_epochs=1,trainer.val_before_train=False
    id: ???
    num: ???
    config_name: ppo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /root/Focus-and-Spec-ascend
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /root/Focus-and-Spec-ascend/verl/verl/trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /root/Focus-and-Spec-ascend/outputs/2026-04-21/16-30-25
    choices:
      algorithm@algorithm.rollout_correction: rollout_correction
      reward_model: dp_reward_model
      critic: dp_critic
      critic/../engine@critic.model.fsdp_config: fsdp
      critic/../optim@critic.optim: fsdp
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      data: legacy_data
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
